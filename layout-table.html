<html>
    <head>
        <title>Layout dengan table</title>
        <style>
            table{
                width: 100%;
                text-align: center;
                border-collapse: collapse;
            }
            .Jumbotron{
                height: 70px;
                font-size: 20pt;
                text-align: center;
            }
            .navigasi{
                font-size: 20px;
                text-align: center;
                height: 50px;
            }
            .container{
                padding: 12px;
                height: 190px;
            }
            .footer{
                height: 40px;
            }
            
        </style>
    </head>
    <body>
        <table border="i">
            <tr>
                <td colspan="3" class="jumbotron">Jumbotron </td>
            </tr>
            <tr>
                <td coslspan="2" class="navigasi"></td>
                <td coslspan="2" class="navigasi">Header/Menu/Navigasi</td>
                <td coslspan="" class="navigasi"></td>
                

            </tr>
            <tr>
                <td class="container" width="20%">Sidebar kiri</td>
                <td class="container" width="20%">Konten inti container</td>
                <td class="container" width="20%">sideban Kanan</td>
            </tr>
            <tr>
                <td colspan="3" class="footer">Footer</td>
            </tr>
        </table>
    </body>
</html>
